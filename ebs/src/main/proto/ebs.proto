syntax = "proto3";

package ebs;

option java_package = "org.ebs.proto";
option java_outer_classname = "EbsProto";
option java_multiple_files = false;

message ProtoPubMessage {
  string pub_id = 1;
  int64 timestamp = 2;
  ProtoPublication publication = 3;
}

message ProtoPublication {
  repeated ProtoPublicationField fields = 1;
}

message ProtoPublicationField {
  string field_name = 1;
  ProtoTypedValue value = 2;
}

message ProtoTypedValue {
  string type_tag = 1;
  string raw_value = 2;
}

message ProtoBrokerMessage {
  int32 current_broker_index = 1;
  int32 target_broker_id = 2;
  repeated string matched_subscriber_ids = 3;
  ProtoPubMessage pub_message = 4;
}

message ProtoSubRegistration {
  string subscriber_id = 1;
  int32 sub_index = 2;
  ProtoSubscription subscription = 3;
}

message ProtoSubscription {
  repeated ProtoSubscriptionField fields = 1;
}

message ProtoSubscriptionField {
  string field_name = 1;
  string operator = 2;
  ProtoTypedValue value = 3;
}

message ProtoDeliveryReport {
  string pub_id = 1;
  string subscriber_id = 2;
  int64 delivery_timestamp = 3;
  int64 latency_ms = 4;
}
